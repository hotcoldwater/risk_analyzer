services:
  - type: web
    name: risk-analyzer-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DART_API_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CACHE_TTL_SECONDS
        value: "86400"
